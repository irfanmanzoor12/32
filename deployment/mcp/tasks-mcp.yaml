apiVersion: apps/v1
kind: Deployment
metadata:
  name: tasks-mcp
  labels:
    app: tasks-mcp
spec:
  replicas: 1
  selector:
    matchLabels:
      app: tasks-mcp
  template:
    metadata:
      labels:
        app: tasks-mcp
    spec:
      containers:
        - name: tasks-mcp
          image: tasks-mcp:latest
          ports:
            - containerPort: 8000
          env:
            - name: PYTHONPATH
              value: src
          livenessProbe:
            httpGet:
              path: /health
              port: 8000
            initialDelaySeconds: 5
            periodSeconds: 10
          readinessProbe:
            httpGet:
              path: /health
              port: 8000
            initialDelaySeconds: 3
            periodSeconds: 5
---
apiVersion: v1
kind: Service
metadata:
  name: tasks-mcp-svc
spec:
  selector:
    app: tasks-mcp
  ports:
    - protocol: TCP
      port: 8000
      targetPort: 8000
